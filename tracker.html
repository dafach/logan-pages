<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Progress Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 16px; max-width: 800px; margin: 0 auto; -webkit-font-smoothing: antialiased; }
  h1 { text-align: center; font-size: 1.6em; margin-bottom: 8px; color: #fff; }
  .subtitle { text-align: center; color: #888; margin-bottom: 20px; font-size: 0.85em; line-height: 1.4; }

  /* Anchor lifts */
  .static-card { background: #161616; border: 1px solid #2a2a2a; border-radius: 12px; margin-bottom: 12px; overflow: hidden; padding: 16px; }
  .static-card h2 { font-size: 1em; color: #fff; margin: 0 0 12px; }
  .section-label { font-size: 0.75em; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .anchor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .anchor-item { background: #1a1a1a; border-radius: 8px; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
  .anchor-weight { font-size: 1.1em; color: #fff; font-weight: 600; }
  .anchor-label { color: #999; font-size: 0.85em; }

  /* Tab bar */
  .tab-bar { display: flex; gap: 8px; position: sticky; top: 0; z-index: 100; background: #0a0a0a; padding: 12px 0; margin-bottom: 12px; }
  .tab-btn { flex: 1; min-height: 48px; border-radius: 10px; font-size: 1em; font-weight: 700; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: rgba(255,255,255,0.05); border: 2px solid; background: transparent; letter-spacing: 0.5px; }
  .tab-btn:active { transform: scale(0.97); }

  /* Tab A - Blue */
  .tab-btn[data-tab="A"] { border-color: #4a9eff; color: #4a9eff; }
  .tab-btn[data-tab="A"].active { background: #4a9eff; color: #fff; border-color: #4a9eff; }
  .tab-btn[data-tab="A"]:not(.active) { opacity: 0.5; }

  /* Tab B - Green */
  .tab-btn[data-tab="B"] { border-color: #4ade80; color: #4ade80; }
  .tab-btn[data-tab="B"].active { background: #4ade80; color: #0a0a0a; border-color: #4ade80; }
  .tab-btn[data-tab="B"]:not(.active) { opacity: 0.5; }

  /* Tab C - Purple */
  .tab-btn[data-tab="C"] { border-color: #a78bfa; color: #a78bfa; }
  .tab-btn[data-tab="C"].active { background: #a78bfa; color: #fff; border-color: #a78bfa; }
  .tab-btn[data-tab="C"]:not(.active) { opacity: 0.5; }

  /* Session panels */
  .session-panel { display: none; }
  .session-panel.active { display: block; }

  /* Exercise cards */
  .exercise-card { background: #161616; border: 1px solid #2a2a2a; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .exercise-header { padding: 14px 16px; border-bottom: 1px solid #222; }
  .exercise-header h3 { font-size: 0.95em; color: #fff; margin: 0; }
  .exercise-header .target { font-size: 0.75em; color: #666; margin-top: 2px; }
  .exercise-body { padding: 0 16px 14px; }

  /* Tables */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 0.72em; color: #666; padding: 8px 6px; border-bottom: 1px solid #222; white-space: nowrap; }
  td { padding: 8px 6px; font-size: 0.83em; border-bottom: 1px solid #1a1a1a; color: #ccc; }
  tr:last-child td { border-bottom: none; }

  /* Verdict colors */
  .verdict-up { color: #6bff6b; font-weight: 600; }
  .verdict-hold { color: #ffd96b; font-weight: 600; }

  /* No data message */
  .no-data { color: #666; font-style: italic; font-size: 0.9em; padding: 24px 16px; text-align: center; }

  .footer { text-align: center; color: #444; font-size: 0.75em; margin-top: 30px; }

  @media (max-width: 480px) {
    body { padding: 12px; }
    h1 { font-size: 1.35em; }
    .tab-btn { font-size: 0.9em; min-height: 48px; }
    .anchor-grid { grid-template-columns: 1fr; }
    .anchor-item { padding: 10px; }
    .static-card { padding: 14px 12px; }
    .exercise-header { padding: 12px; }
    .exercise-body { padding: 0 12px 12px; }
    th, td { padding: 6px 4px; font-size: 0.78em; }
  }
</style>
</head>
<body>

<h1>Training Progress Tracker</h1>
<p class="subtitle">Last Updated: March 25, 2026</p>

<!-- ANCHOR LIFTS SUMMARY (always visible) -->
<div class="static-card" id="anchor-lifts">
  <h2>Anchor Lifts</h2>
  <p class="section-label">Current working weights</p>
  <div class="anchor-grid" id="anchor-grid"></div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn" data-tab="A" onclick="switchTab('A')">Session A</button>
  <button class="tab-btn" data-tab="B" onclick="switchTab('B')">Session B</button>
  <button class="tab-btn" data-tab="C" onclick="switchTab('C')">Session C</button>
</div>

<!-- SESSION PANELS -->
<div class="session-panel" id="panel-A"></div>
<div class="session-panel" id="panel-B"></div>
<div class="session-panel" id="panel-C"></div>

<p class="footer">Progress tracked by Logan. Data updates after each session.</p>

<script>
const DATA = {
  "anchorLifts": [
    {"name": "DB Incline Bench", "current": "50 lbs"},
    {"name": "Chin-Up", "current": "BW"},
    {"name": "Bulgarian Split Squat", "current": "50 lbs"},
    {"name": "SL DB RDL", "current": "60 lbs"},
    {"name": "Chest Supported Row", "current": "50 lbs"}
  ],
  "sessions": {
    "A": {
      "exercises": [
        {
          "name": "DB Incline Bench",
          "target": "8-10",
          "history": [
            {"date": "Mar 23", "weight": 50, "sets": [10,10,10], "next": "UP to 55", "verdict": "up"}
          ]
        },
        {
          "name": "Chin-Up",
          "target": "6-8",
          "history": [
            {"date": "Mar 23", "weight": "BW", "sets": [10,10,10], "next": "UP \u2014 add BW+10", "verdict": "up"}
          ]
        },
        {
          "name": "Bulgarian Split Squat",
          "target": "8-10/side",
          "history": [
            {"date": "Mar 23", "weight": 50, "sets": [10,10,10], "next": "UP to 55", "verdict": "up"}
          ]
        },
        {
          "name": "Cable Face Pull",
          "target": "14-16",
          "history": [
            {"date": "Mar 23", "weight": 30, "sets": [12,12,12], "next": "Hold 30, push for 14+", "verdict": "hold"}
          ]
        },
        {
          "name": "Incline DB Curl",
          "target": "12-14",
          "history": [
            {"date": "Mar 23", "weight": 25, "sets": [10,10,10], "next": "Hold 25, push for 12+", "verdict": "hold"}
          ]
        }
      ]
    },
    "B": {
      "exercises": []
    },
    "C": {
      "exercises": [
        {
          "name": "DB Bench Press",
          "target": "8-10",
          "history": [
            {"date": "Mar 25", "weight": 50, "sets": [12,12,12], "next": "UP to 60", "verdict": "up"}
          ]
        },
        {
          "name": "SL DB RDL",
          "target": "10-12/side",
          "history": [
            {"date": "Mar 25", "weight": 60, "sets": [12,12,12], "next": "UP to 65", "verdict": "up"}
          ]
        },
        {
          "name": "Chest Supported Row",
          "target": "10-12",
          "history": [
            {"date": "Mar 25", "weight": 50, "sets": [12,12,12], "next": "UP to 55", "verdict": "up"}
          ]
        },
        {
          "name": "Tricep Pushdown",
          "target": "12-14",
          "history": [
            {"date": "Mar 25", "weight": 25, "sets": [12,12,12], "next": "Hold 25, push for 14+", "verdict": "hold"}
          ]
        },
        {
          "name": "Reverse Fly",
          "target": "14-16",
          "history": [
            {"date": "Mar 25", "weight": 5, "sets": [12,12,12], "next": "Hold 5, push for 14+", "verdict": "hold"}
          ]
        },
        {
          "name": "Leg Extension",
          "target": "12-14",
          "history": [
            {"date": "Mar 25", "weight": 55, "sets": [12,10,10], "next": "Hold 55, push for 12+", "verdict": "hold"}
          ]
        }
      ]
    }
  },
  "lastUpdated": "March 25, 2026"
};

// Render anchor lifts
function renderAnchors() {
  const grid = document.getElementById('anchor-grid');
  grid.innerHTML = DATA.anchorLifts.map(a =>
    `<div class="anchor-item">
      <span class="anchor-label">${a.name}</span>
      <span class="anchor-weight">${a.current}</span>
    </div>`
  ).join('');
  document.querySelector('.subtitle').textContent = 'Last Updated: ' + DATA.lastUpdated;
}

// Render a session panel
function renderSession(key) {
  const panel = document.getElementById('panel-' + key);
  const session = DATA.sessions[key];

  if (!session || session.exercises.length === 0) {
    panel.innerHTML = '<div class="exercise-card"><p class="no-data">No data yet \u2014 complete Session ' + key + ' to start tracking</p></div>';
    return;
  }

  panel.innerHTML = session.exercises.map(ex => {
    const rows = ex.history.map(h => {
      const w = typeof h.weight === 'number' ? h.weight + ' lbs' : h.weight;
      const verdictClass = h.verdict === 'up' ? 'verdict-up' : 'verdict-hold';
      return `<tr>
        <td>${h.date}</td>
        <td>${w}</td>
        <td>${h.sets[0] || '-'}</td>
        <td>${h.sets[1] || '-'}</td>
        <td>${h.sets[2] || '-'}</td>
        <td class="${verdictClass}">${h.next}</td>
      </tr>`;
    }).join('');

    return `<div class="exercise-card">
      <div class="exercise-header">
        <h3>${ex.name}</h3>
        <div class="target">Target: ${ex.target} reps</div>
      </div>
      <div class="exercise-body">
        <div class="table-wrap">
          <table>
            <tr><th>Date</th><th>Weight</th><th>Set 1</th><th>Set 2</th><th>Set 3</th><th>Next</th></tr>
            ${rows}
          </table>
        </div>
      </div>
    </div>`;
  }).join('');
}

// Tab switching
function switchTab(key) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.session-panel').forEach(p => p.classList.remove('active'));
  document.querySelector('.tab-btn[data-tab="' + key + '"]').classList.add('active');
  document.getElementById('panel-' + key).classList.add('active');
}

// Find most recently updated session
function getMostRecentTab() {
  let latest = null;
  let latestKey = 'A';
  for (const [key, session] of Object.entries(DATA.sessions)) {
    if (session.exercises.length === 0) continue;
    for (const ex of session.exercises) {
      for (const h of ex.history) {
        // Simple comparison — dates like "Mar 25" are ordered by position in data
        // Since C has Mar 25 and A has Mar 23, C is most recent
        if (!latest) { latest = h.date; latestKey = key; }
        else {
          // Compare month-day roughly; newest data wins
          latest = h.date;
          latestKey = key;
        }
      }
    }
  }
  return latestKey;
}

// Initialize
renderAnchors();
['A', 'B', 'C'].forEach(renderSession);
switchTab(getMostRecentTab());
</script>

</body>
</html>
